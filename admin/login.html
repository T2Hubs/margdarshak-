<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Margdarshak</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a2463 0%,#1d4ed8 100%);}
    .login-box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(10,36,99,0.35);}
    .login-logo{text-align:center;margin-bottom:32px;}

    /* Square icon box (letter or image) */
    .logo-icon{
      width:64px;height:64px;
      background:#0a2463;color:#fff;
      border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      font-size:28px;font-weight:900;
      margin:0 auto 14px;
      overflow:hidden;
    }
    /* Image inside the square icon box */
    .logo-icon img{
      width:100%;height:100%;
      object-fit:cover;
      border-radius:16px;
      display:block;
    }
    /* Full-width banner logo image (no box) */
    .logo-img-full{
      height:56px;width:auto;
      max-width:200px;
      object-fit:contain;
      display:block;
      margin:0 auto 14px;
    }
    .login-logo h2{font-size:20px;color:#0a2463;font-weight:700;margin-top:2px;}
    .login-logo p{font-size:13px;color:#64748b;margin-top:5px;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:15px;}
    .form-group input{width:100%;padding:13px 14px 13px 42px;border:1.5px solid #e2e8f0;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:#1e293b;background:#f8fafc;outline:none;transition:.3s;}
    .form-group input:focus{border-color:#1d4ed8;background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.08);}
    .login-btn{width:100%;padding:14px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:.3s;margin-top:8px;}
    .login-btn:hover{background:#0a2463;transform:translateY(-1px);}
    .error-msg{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:14px;margin-bottom:14px;display:none;align-items:center;gap:8px;}
    .back-link{text-align:center;margin-top:20px;font-size:13px;color:#64748b;}
    .back-link a{color:#1d4ed8;font-weight:600;}
    .hint{font-size:12px;color:#94a3b8;text-align:center;margin-top:16px;padding:10px;background:#f8fafc;border-radius:8px;}
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">

    <!--
      OPTION 1 (Default) — Letter icon + text
    -->
    <div class="logo-icon">
      <img src="..//images/margdarshaklogo.png" alt="logo">
    </div>
    <h2>Admin Panel</h2>
    <p>Margdarshak Career Institute</p>

    <!--
      OPTION 2 — Your image inside the square box + text
      (put your logo file in images/ folder)

    <div class="logo-icon">
      <img src="../images/logo.png" alt="Margdarshak Logo"/>
    </div>
    <h2>Admin Panel</h2>
    <p>Margdarshak Career Institute</p>
    -->

    <!--
      OPTION 3 — Full banner logo image only (no box, no text needed)

    <img src="../images/logo.png" alt="Margdarshak Logo" class="logo-img-full"/>
    <p style="margin-top:4px;font-size:13px;color:#64748b">Admin Panel</p>
    -->

  </div>
  <div class="error-msg" id="errorMsg"><i class="fas fa-exclamation-circle"></i> Incorrect username or password!</div>
  <div class="form-group">
    <label>Username</label>
    <div class="input-wrap">
      <i class="fas fa-user"></i>
      <input type="text" id="username" placeholder="admin" autocomplete="username"/>
    </div>
  </div>
  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
  </div>
  <button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Login</button>
  <div class="hint">Default credentials: <strong>admin</strong> / <strong>margdarshak@2025</strong></div>
  <div class="back-link"><a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a></div>
</div>
<script>
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'margdarshak@2025';
  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      sessionStorage.setItem('mg_admin_auth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      err.style.display = 'flex';
      setTimeout(() => err.style.display = 'none', 3000);
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  if (sessionStorage.getItem('mg_admin_auth') === 'true') window.location.href = 'dashboard.html';
</script>
</body>
</html>
